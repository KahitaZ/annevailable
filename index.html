<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>annevailable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    :root {
      --coral: #FF6B50;
      --teal: #0ABAB5;
      --bg: #0e0e0e;
      --fg: #f0ebe6;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 2.5rem;
    }

    .logo {
      width: min(340px, 80vw);
    }

    .logo svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .name {
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: lowercase;
      color: var(--fg);
    }

    .instagram {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--coral);
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      letter-spacing: 0.12em;
      opacity: 0.8;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
    }

    .instagram:hover,
    .instagram:focus {
      opacity: 1;
    }

    .instagram svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    #ig-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      align-items: center;
      justify-content: center;
      background: rgba(14,14,14,0.72);
      backdrop-filter: blur(4px);
    }

    #ig-popup.open {
      display: flex;
    }

    #ig-popup-box {
      background: #161616;
      border: 1px solid var(--coral);
      border-radius: 14px;
      padding: 2rem 2.4rem;
      max-width: min(340px, 88vw);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    #ig-popup-box p {
      color: var(--fg);
      font-size: clamp(0.9rem, 4vw, 1.05rem);
      line-height: 1.55;
      letter-spacing: 0.04em;
    }

    #ig-popup-close {
      align-self: center;
      background: none;
      border: 1px solid var(--teal);
      color: var(--teal);
      border-radius: 8px;
      padding: 0.45rem 1.4rem;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    #ig-popup-close:hover {
      opacity: 1;
    }
  </style>
</head>

  <button class="instagram" id="ig-btn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
    </svg>
    @anne__vailable
  </button>

  <div id="ig-popup">
    <div id="ig-popup-box">
      <p>Instahandle musst du dir noch saven&nbsp;;)<br>Happy birthday ♡</p>
      <button id="ig-popup-close">ok</button>
    </div>
  </div>

  <script>
    const igPopup = document.getElementById('ig-popup');
    document.getElementById('ig-btn').addEventListener('click', () => igPopup.classList.add('open'));
    document.getElementById('ig-popup-close').addEventListener('click', () => igPopup.classList.remove('open'));
    igPopup.addEventListener('click', e => { if (e.target === igPopup) igPopup.classList.remove('open'); });
  </script>
